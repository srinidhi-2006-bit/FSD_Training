<!--
Student Profile Card
Objective
Create a responsive student profile card.
Requirements
Display:
• Student Photo
• Name
• Roll Number
• Branch
• Email
Desktop Layout:
Photo | Details
Mobile Layout:
Photo
Details
Constraints
• Width: 500px
• Border Radius: 10px
• Shadow Effect
Expected Output
---------------------
| Photo | Student |
| | Details |
---------------------
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="student-card">
        <img src="profile.jpg" alt="Profile Image" class="profile-image">
        <div class="details">
            <h2>Name: Srinidhi</h2>
            <h2>Roll No: 23B81A67B4</h2>
            <h2>Branch: Computer Science</h2>
            <h2>Email: srinidhi@gmail.com</h2>
        </div>
    </div>
</body>
</html>
