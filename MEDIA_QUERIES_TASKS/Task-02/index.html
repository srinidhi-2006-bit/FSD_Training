<!--
Exercise 2: Responsive Student Profile Card
Requirements
Create a student card containing:
• Profile Image
• Name
• Branch
• Email
Desktop:
Image | Details
Mobile:
Image
Details
Concepts
• Flexbox
• Media Queries
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task-02</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="student-card">
        <img src="profile.jpg" alt="Profile Image" class="profile-image">
        <div class="details">
            <h2>Name: Srinidhi</h2>
            <p>Branch: Computer Science</p>
            <p>Email:
                <a href="mailto:srinidhi@gmail.com">srinidhi@gmail.com</a>
            </p>
        </div>
    </div>
</body>
</html>
