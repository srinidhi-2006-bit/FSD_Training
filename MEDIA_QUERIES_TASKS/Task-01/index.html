<!--
Exercise 1: Responsive Navigation Bar
Requirements
• Create a navigation bar with:
o Home
o About
o Services
o Contact
• Desktop (>768px): display menu items horizontally.
• Mobile (≤768px): display menu items vertically.
Concepts
• Flexbox
• Media Queries
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task-01</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
    </nav>
</body>
</html>
