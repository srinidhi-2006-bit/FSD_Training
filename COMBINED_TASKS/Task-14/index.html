<!--
Exercise 14: Responsive Product Card
Requirements
Display:
• Product Image
• Name
• Price
• Buy Button
Features:
• Responsive Layout
• Image Zoom on Hover
• Button Transition
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task-14</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <article class="product-card">
    <div class="product-image">
      <img src="helmet.jpg" alt="Stylish helmet" />
    </div>
    <div class="product-details">
      <h1>Name: Helmet</h1>
      <h2>Price: $89.99</h2>
      <button class="buy-button" type="button">Buy Now</button>
    </div>
  </article>
</body>
</html>
