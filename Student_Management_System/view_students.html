<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Students - Student Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="dashboard.html" id="dashboard">Dashboard</a>
        <a href="add_students.html" id="addStudent">Add Students</a>
        <a href="view_students.html" id="viewStudent">View Students</a>
        <a href="logout.html" id="logout">Logout</a>
    </nav>
    <div class="content">
        <h1>View Students</h1>
        <table border="1">
            <thead>
                <tr>
                    <th>Roll No</th>
                    <th>Name</th>
                    <th>Branch</th>
                    <th>CGPA</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="studentTableBody"></tbody>
        </table>
    </div>
    <script>
        let students = JSON.parse(localStorage.getItem("students"));
        let tbody = document.getElementById("studentTableBody");
        function deleteStudent(index) {
            students.splice(index, 1);
            localStorage.setItem("students", JSON.stringify(students));
            location.reload();
        }
        function editStudent(index) {
            localStorage.setItem("editIndex", index);
            window.location.href = "edit_students.html";
        }
        students.forEach((student,index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${student.rollNo}</td>
                    <td>${student.name}</td>
                    <td>${student.branch}</td>
                    <td>${student.cgpa}</td>
                    <td>
                        <button onclick="editStudent(${index})">Edit</button> 
                        <button onclick="deleteStudent(${index})">Delete</button>
                    </td>
                </tr>`;
        });
    </script>
</body>
</html>
