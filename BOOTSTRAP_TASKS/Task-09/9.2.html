<!--
Exercise 9.2:
Add button groups using btn-group, and create toggle buttons with checkboxes.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task-9.2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="btn-group">
        <button class="btn btn-primary">Button 1</button>
        <button class="btn btn-secondary">Button 2</button>
        <button class="btn btn-danger">Button 3</button>
    </div>
    <input type="checkbox" class="btn-check" id="btn1">
    <label class="btn btn-outline-success" for="btn1">Toggle</label>
</body>
</html>
