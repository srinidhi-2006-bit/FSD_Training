<!--
Exercise 18.2:
Create a collapsible accordion using accordion and Bootstrap JavaScript behavior.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task-18.2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
  <div class="accordion" id="acc">
    <div class="accordion-item">
        <h2 class="accordion-header">
            <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#one">
                Section 1
            </button>
        </h2>
        <div id="one" class="accordion-collapse collapse show">
            <div class="accordion-body">
                Accordion Content
            </div>
        </div>
    </div>
  </div>
</body>
</html>
