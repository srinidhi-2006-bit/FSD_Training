<!--
Exercise 17.2:
Replace text buttons with icon-only buttons using Bootstrap Icons.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task-17.2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>
<body class="d-flex justify-content-center align-items-center vh-100 gap-3">
    <button class="btn btn-primary" aria-label="Airplane">
        <i class="bi bi-airplane"></i>
    </button>

    <button class="btn btn-danger" aria-label="Apple">
        <i class="bi bi-apple"></i>
    </button>
</body>
</html>
