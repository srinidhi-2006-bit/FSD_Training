<!--
17. Icons with Bootstrap Icons
Exercise 17.1:
Install and use Bootstrap Icons in a webpage: add social media icons in the footer.
Exercise 17.2:
Replace text buttons with icon-only buttons using Bootstrap Icons.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task-17.1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>
<body>
    <footer class="position-fixed bottom-0 w-100 bg-dark text-white text-center p-5 m-5">
        <i class="bi bi-facebook"></i>
        <i class="bi bi-twitter"></i>
        <i class="bi bi-instagram"></i>
    </footer>
</body>
</html>
