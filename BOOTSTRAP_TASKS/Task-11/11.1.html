<!--
11. Cards and Media Objects
Exercise 11.1:
Create a profile card using card, card-body, card-title, and card-img-top.
Exercise 11.2:
Design a media object layout using media and align an image to the left of the content.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task-11.1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="card" style="width:500px;">
        <img src="profile.jpg" class="card-img-top">
        <div class="card-body">
            <h2 class="card-title">Profile Card</h2>
            <p>Name:Srinidhi</p>
            <p>Roll No: 23B81A67B4</p>
            <p>Branch: Computer Science</p>
        </div>
    </div>
</body>
</html>
