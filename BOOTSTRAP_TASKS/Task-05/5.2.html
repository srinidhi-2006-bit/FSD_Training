<!--
Exercise 5.2:
Reorder columns on different screen sizes using order-md-2, order-md-1.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task-5.2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="row">
        <div class="col-md-6 order-md-2 bg-primary">Second on Desktop</div>
        <div class="col-md-6 order-md-1 bg-success">First on Desktop</div>
    </div>
</body>
</html>
