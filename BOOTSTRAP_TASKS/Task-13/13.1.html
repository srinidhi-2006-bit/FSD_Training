<!--
13. Colors and Backgrounds
Exercise 13.1:
Create a dashboard page using contextual background classes (bg-primary, bg-warning, etc.) and
text colors.

Exercise 13.2:
Use bg-gradient with bg-dark and white text.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task-13.1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="bg-primary text-white p-3">Primary</div>
    <div class="bg-warning text-dark p-3">Warning</div>
    <div class="bg-success text-white p-3">Success</div>
    <div class="bg-danger text-dark p-3">Dark</div>
</body>
</html>
