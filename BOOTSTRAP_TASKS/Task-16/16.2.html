<!--
Exercise 16.2:
Use position-relative and position-absolute to overlay a badge over an image.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task-16.2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="position-relative d-inline-block p-5">
        <img src="helmet.jpg" width="200" alt="Helmet">
        <span class="badge bg-danger position-absolute top-0 start-100 translate-middle m-5">
            Helmet
        </span>
    </div>
</body>
</html>
