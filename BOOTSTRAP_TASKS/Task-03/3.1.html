<!--
3. Fundamentals of Responsive Grid Layout
Exercise 3.1:
Create a container with three columns that stack vertically on mobile, two-per-row on tablets,
and three-per-row on desktops.
Exercise 3.2:
Use .container, .row, and .col-* classes appropriately for responsive design.
-->

<!--3.1 Responsive Three Columns-->

<!DOCTYPE html>
<html>
<head>
    <title>Task-3.1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-12 col-md-6 col-lg-4 bg-primary ">Column 1</div>
            <div class="col-12 col-md-6 col-lg-4 bg-success ">Column 2</div>
            <div class="col-12 col-md-6 col-lg-4 bg-danger ">Column 3</div>
        </div>
    </div>
</body>
</html>
