<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <img src="" class="brand-logo" alt="">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                <li class="nav-item"><a class="btn btn-warning ms-2 nav-cta" href="login.html">Login</a></li>
            </ul>
        </div>
    </div>
</nav>
<main class="container">
    <div class="card login-card p-4 bg-white">
        <div class="card-body">
            <h3 class="card-title mb-3">Student Login</h3>
            <div id="loginAlert"></div>
            <form id="loginForm" novalidate>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="loginEmail" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <p class="mt-3 text-center">New user? <a href="registration.html">Register here</a></p>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const alertEl = document.getElementById('loginAlert');

        if (!email || !password) {
            alertEl.innerHTML = '<div class="alert alert-danger alert-dismissible fade show" role="alert">Please enter both email and password.<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button></div>';
            return;
        }
        alertEl.innerHTML = '<div class="alert alert-success alert-dismissible fade show" role="alert">Login successful! Redirecting to Courses...<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button></div>';
        setTimeout(() => {
            window.location.href = 'courses.html';
        }, 1400);
    });
</script>
</body>
</html>
