<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script>
        function showAlert(event) {
            event.preventDefault();
            document.getElementById("successAlert").style.display = "block";
            document.getElementById("registrationForm").reset();
        }
    </script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="images/cvr_logo.jpg" alt="Logo" width="100" height="100">
            </a>
            <a class="navbar-brand" href="#">Srinidhi Training Institute</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#login">Login</button>
                </ul>
            </div>
        </div>
    </nav>
    <!-- Registration Form -->
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h2 class="mb-4 fw-bold">Online Course Registration</h2>
                <!-- Success Alert -->
                <div id="successAlert" class="alert alert-success alert-dismissible fade show"
                    style="display:none;">
                    Registration Successful! Thank you for enrolling.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <form id="registrationForm" onsubmit="showAlert(event)">
                    <!-- Student Name -->
                    <div class="mb-3">
                        <label class="form-label">Student Name</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" required>
                    </div>
                    <!-- Mobile Number -->
                    <div class="mb-3">
                        <label class="form-label">Mobile Number</label>
                        <div class="input-group">
                            <span class="input-group-text">+91</span>
                            <input type="tel" class="form-control"
                                pattern="[0-9]{10}" required>
                        </div>
                    </div>
                    <!-- Gender -->
                    <div class="mb-3">
                        <label for="gender" class="form-label">Gender</label>
                        <br>
                        <input class="form-check-input" type="radio" name="gender" required>
                        <label class="form-check-label">Male</label>
                        <input class="form-check-input" type="radio" name="gender" required>
                        <label class="form-check-label">Female</label>
                        <input class="form-check-input" type="radio" name="gender" required>
                        <label class="form-check-label">Others</label>
                    </div>
                    <!-- Course Selection -->
                    <div class="mb-3">
                        <label class="form-label">Course Selection</label>
                        <select class="form-select" required>
                            <option value="">Choose Course</option>
                            <option>Web Development</option>
                            <option>Python Programming</option>
                            <option>Data Science</option>
                            <option>AI & Machine Learning</option>
                            <option>Java Programming</option>
                            <option>Cloud Computing</option>
                        </select>
                    </div>
                    <!-- Qualification -->
                    <div class="mb-3">
                        <label class="form-label">Qualification</label>
                        <select class="form-select" required>
                            <option value="">Select Qualification</option>
                            <option>Intermediate</option>
                            <option>Diploma</option>
                            <option>B.Tech</option>
                            <option>B.Sc</option>
                            <option>M.Tech</option>
                            <option>MCA</option>
                        </select>
                    </div>
                    <!-- Address -->
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" rows="4"
                            required></textarea>
                    </div>
                    <!-- Upload Resume -->
                    <div class="mb-3">
                        <label class="form-label">Upload Resume</label>
                        <input type="file" class="form-control"
                            accept=".pdf,.doc,.docx" required>
                    </div>
                    <!-- Terms & Conditions -->
                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox"
                            required>
                        <label class="form-check-label">
                            I agree to the Terms & Conditions
                        </label>
                    </div>
                    <!-- Buttons -->
                    <button type="submit" class="btn btn-primary" Register</button>
                    <button type="reset" class="btn btn-secondary">Clear</button>
                </form>
            </div>
        </div>
    </div>
    <!-- Login Modal -->
    <div class="modal fade" id="login" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Student Login</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="loginAlert"></div>
                    <form id="loginForm" novalidate>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="loginEmail" placeholder="Enter Email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="loginPassword" placeholder="Enter Password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                    <p class="mt-3 text-center">
                        New User?
                        <a href="register.html">Register Here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
