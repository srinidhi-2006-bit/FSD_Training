<!DOCTYPE html>
<html>
<head>
    <title>Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container mt-5">
        <h2>Course Registration</h2>
        <form>
            <input class="form-control mt-2" placeholder="Student Name">
            <input type="email" class="form-control mt-2" placeholder="Email">
            <input class="form-control mt-2" placeholder="Mobile Number">
            <div class="mt-2">
                Gender:
                <input type="radio"> Male
                <input type="radio"> Female
            </div>
            <select class="form-control mt-2">
                <option>Select Course</option>
                <option>Web Development</option>
                <option>Python</option>
                <option>Data Science</option>
            </select>
            <input class="form-control mt-2" placeholder="Qualification">
            <textarea class="form-control mt-2" placeholder="Address"></textarea>
            <input type="file" class="form-control mt-2">
            <div class="mt-2">
                <input type="checkbox"> Accept Terms & Conditions
            </div>
            <button type="button" class="btn btn-success mt-3"
                data-bs-toggle="modal"
                data-bs-target="#successModal">
                Submit
            </button>
        </form>
    </div>
    <div class="modal fade" id="successModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h4>Success</h4>
                </div>
                <div class="modal-body">
                    <div class="alert alert-success">
                        Registration Successful
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
