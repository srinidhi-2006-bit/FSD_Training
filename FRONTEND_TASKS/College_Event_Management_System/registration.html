<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration - College Event Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand"
                href="index.html">College Event Management System
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="events.html"> Events</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="gallery.html">Gallery</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="registration.html">Registration</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="schedule.html">Schedule</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " href="faq.html">FAQ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- Header -->
    <section class="bg-primary text-white text-center py-5">
        <div class="container">
            <h1 class="display-4">Event Registration</h1>
            <p class="lead">Register for your favorite events</p>
        </div>
    </section>
    <!-- Registration Form -->
    <section class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <!-- Success Alert -->
                <div id="successAlert"
                    class="alert alert-success d-none">
                    Registration Successful!
                    Thank you for registering.
                </div>
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="mb-4 text-center">Student Registration Form</h3>
                        <form id="registrationForm">
                            <!-- Student Name -->
                            <div class="mb-3">
                                <label class="form-label">Student Name</label>
                                <input type="text" id="studentName" class="form-control" placeholder="Enter your full name" required>
                            </div>
                            <!-- Roll Number -->
                            <div class="mb-3">
                                <label class="form-label"> Roll Number</label>
                                <input type="text" id="rollNumber" class="form-control" placeholder="Enter roll number" required>
                            </div>
                            <!-- Branch -->
                            <div class="mb-3">
                                <label class="form-label">Branch</label>
                                <select id="branch"
                                    class="form-select"
                                    required>
                                    <option value="">Select Branch</option>
                                    <option>CSE</option>
                                    <option>CSE (AI & ML)</option>
                                    <option>ECE</option>
                                    <option>EEE</option>
                                    <option>Mechanical</option>
                                    <option>Civil</option>
                                </select>
                            </div>
                            <!-- Email -->
                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" id="email" class="form-control" placeholder="Enter email" required>
                            </div>
                            <!-- Mobile -->
                            <div class="mb-3">
                                <label class="form-label">Mobile Number</label>
                                <input type="tel" id="mobile" class="form-control" placeholder="Enter mobile number" required>
                            </div>
                            <!-- Event Selection -->
                            <div class="mb-3">
                                <label class="form-label">Select Event</label>
                                <select id="event" class="form-select" required>
                                    <option value="">Choose Event</option>
                                    <option>Technical Quiz</option>
                                    <option>Hackathon</option>
                                    <option>Poster Presentation</option>
                                    <option>Coding Contest</option>
                                    <option>Project Expo</option>
                                    <option>Cultural Fest</option>
                                </select>
                            </div>
                            <!-- Terms -->
                            <div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" id="terms" required>
                                <label class="form-check-label" for="terms">
                                    I agree to the
                                    terms and conditions
                                </label>
                            </div>
                            <!-- Submit Button -->
                            <div class="text-center">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Register Now
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3">
        <p class="mb-0">
            © 2025 College Event Management System
        </p>
    </footer>
</body>
</html>
